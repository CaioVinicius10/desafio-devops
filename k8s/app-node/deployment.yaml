apiVersion: apps/v1
kind: Deployment
metadata:
    name: app
    namespace: desafio-devops
    labels:
        app: app
spec:
    replicas: 2
    selector:
        matchLabels:
            app: app
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1
    template:
        metadata:
            labels:
                app: app
        spec:
            containers:
                - name: app
                  image: desafio-devops-app:latest
                  imagePullPolicy: IfNotPresent
                  command:
                      - dockerize
                      - -wait
                      - tcp://mysql:3306
                      - -timeout
                      - 60s
                      - node
                      - index.js
                  envFrom:
                      - configMapRef:
                            name: app-config
                  env:
                      - name: DB_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: mysql-credentials
                                key: MYSQL_ROOT_PASSWORD
                  ports:
                      - name: http
                        containerPort: 3000
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 3000
                      initialDelaySeconds: 15
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 3000
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
                  resources:
                      requests:
                          memory: 64Mi
                          cpu: 50m
                      limits:
                          memory: 128Mi
                          cpu: 200m
