apiVersion: apps/v1
kind: Deployment
metadata:
    name: nginx
    namespace: desafio-devops
    labels:
        app: nginx
spec:
    replicas: 1
    selector:
        matchLabels:
            app: nginx
    template:
        metadata:
            labels:
                app: nginx
        spec:
            containers:
                - name: nginx
                  image: nginx:1.27-alpine
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: http
                        containerPort: 80
                  volumeMounts:
                      - name: config
                        mountPath: /etc/nginx/conf.d/default.conf
                        subPath: default.conf
                  livenessProbe:
                      httpGet:
                          path: /nginx-health
                          port: 80
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /nginx-health
                          port: 80
                      initialDelaySeconds: 2
                      periodSeconds: 5
                  resources:
                      requests:
                          memory: 32Mi
                          cpu: 25m
                      limits:
                          memory: 64Mi
                          cpu: 100m
            volumes:
                - name: config
                  configMap:
                      name: nginx-config
                      items:
                          - key: default.conf
                            path: default.conf
