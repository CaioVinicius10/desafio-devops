apiVersion: v1
kind: ConfigMap
metadata:
    name: nginx-config
    namespace: desafio-devops
data:
    default.conf: |
        server {
            listen 80;

            location = /nginx-health {
                access_log off;
                add_header Content-Type text/plain;
                return 200 'ok';
            }

            location / {
                proxy_pass http://app:3000;
            }
        }
