apiVersion: apps/v1
kind: Deployment
metadata:
    name: nginx
    namespace: desafio-devops
    labels:
        app: nginx
spec:
    replicas: 1
    selector:
        matchLabels:
            app: nginx
    template:
        metadata:
            labels:
                app: nginx
        spec:
            containers:
                - name: nginx
                  image: desafio-devops-nginx:latest
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: http
                        containerPort: 80
                  livenessProbe:
                      httpGet:
                          path: /nginx-health
                          port: 80
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /nginx-health
                          port: 80
                      initialDelaySeconds: 2
                      periodSeconds: 5
                  resources:
                      requests:
                          memory: 32Mi
                          cpu: 25m
                      limits:
                          memory: 64Mi
                          cpu: 100m
