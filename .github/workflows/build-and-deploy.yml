name: build and push images

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

env:
    REGISTRY_HOST: ${{ secrets.GAR_LOCATION }}-docker.pkg.dev
    IMAGE_PREFIX: ${{ secrets.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}

jobs:
    build:
        name: build and push images
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Calculate short SHA
              id: vars
              run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

            - name: Define if should push to registry
              id: gate
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
                     ( [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.ref }}" == "refs/heads/main" ]] ); then
                      echo "should_push=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "should_push=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Login no Artifact Registry
              if: steps.gate.outputs.should_push == 'true'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY_HOST }}
                  username: _json_key
                  password: ${{ secrets.GCP_SA_KEY }}

            - name: Build & push - app (node)
              uses: docker/build-push-action@v5
              with:
                  context: ./node
                  push: ${{ steps.gate.outputs.should_push == 'true' }}
                  tags: |
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-app:latest
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-app:sha-${{ steps.vars.outputs.sha }}
                  cache-from: type=gha,scope=app
                  cache-to: type=gha,scope=app,mode=max

            - name: Build & push - nginx
              uses: docker/build-push-action@v5
              with:
                  context: ./nginx
                  push: ${{ steps.gate.outputs.should_push == 'true' }}
                  tags: |
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-nginx:latest
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-nginx:sha-${{ steps.vars.outputs.sha }}
                  cache-from: type=gha,scope=nginx
                  cache-to: type=gha,scope=nginx,mode=max

            - name: Build & push - db (mysql)
              uses: docker/build-push-action@v5
              with:
                  context: ./mysql
                  push: ${{ steps.gate.outputs.should_push == 'true' }}
                  tags: |
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-db:latest
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-db:sha-${{ steps.vars.outputs.sha }}
                  cache-from: type=gha,scope=db
                  cache-to: type=gha,scope=db,mode=max

            - name: Resume images published
              if: steps.gate.outputs.should_push == 'true'
              run: |
                  echo "### Imagens publicadas" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "- \`${{ env.IMAGE_PREFIX }}/desafio-devops-app:sha-${{ steps.vars.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- \`${{ env.IMAGE_PREFIX }}/desafio-devops-nginx:sha-${{ steps.vars.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- \`${{ env.IMAGE_PREFIX }}/desafio-devops-db:sha-${{ steps.vars.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
