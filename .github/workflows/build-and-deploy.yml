name: Build, Test and Deploy

on:
    push:
        branches:
            - main
        paths-ignore:
            - k8s/overlays/gar/kustomization.yaml
    pull_request:
        branches:
            - main
    workflow_dispatch:

env:
    REGISTRY_HOST: ${{ secrets.GAR_LOCATION }}-docker.pkg.dev
    IMAGE_PREFIX: ${{ secrets.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}

jobs:
    build:
        name: Build and Push Images
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            sha: ${{ steps.vars.outputs.sha }}
            should_push: ${{ steps.gate.outputs.should_push }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Calculate short SHA
              id: vars
              run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

            - name: Define if should push to registry
              id: gate
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
                     ( [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.ref }}" == "refs/heads/main" ]] ); then
                      echo "should_push=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "should_push=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Login to Artifact Registry
              if: steps.gate.outputs.should_push == 'true'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY_HOST }}
                  username: _json_key
                  password: ${{ secrets.GCP_SA_KEY }}

            - name: Build & push - app (node)
              uses: docker/build-push-action@v5
              with:
                  context: ./node
                  push: ${{ steps.gate.outputs.should_push == 'true' }}
                  tags: |
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-app:latest
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-app:sha-${{ steps.vars.outputs.sha }}
                  cache-from: type=gha,scope=app
                  cache-to: type=gha,scope=app,mode=max

            - name: Build & push - nginx
              uses: docker/build-push-action@v5
              with:
                  context: ./nginx
                  push: ${{ steps.gate.outputs.should_push == 'true' }}
                  tags: |
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-nginx:latest
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-nginx:sha-${{ steps.vars.outputs.sha }}
                  cache-from: type=gha,scope=nginx
                  cache-to: type=gha,scope=nginx,mode=max

            - name: Build & push - db (mysql)
              uses: docker/build-push-action@v5
              with:
                  context: ./mysql
                  push: ${{ steps.gate.outputs.should_push == 'true' }}
                  tags: |
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-db:latest
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-db:sha-${{ steps.vars.outputs.sha }}
                  cache-from: type=gha,scope=db
                  cache-to: type=gha,scope=db,mode=max

            - name: Published images summary
              if: steps.gate.outputs.should_push == 'true'
              run: |
                  echo "### Published images" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "- \`${{ env.IMAGE_PREFIX }}/desafio-devops-app:sha-${{ steps.vars.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- \`${{ env.IMAGE_PREFIX }}/desafio-devops-nginx:sha-${{ steps.vars.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- \`${{ env.IMAGE_PREFIX }}/desafio-devops-db:sha-${{ steps.vars.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

    test:
        name: Test
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: npm
                  cache-dependency-path: node/package-lock.json

            - name: Test Node app (install + syntax check)
              working-directory: node
              run: |
                  npm ci --omit=dev
                  node --check index.js
                  node --check routes.js
                  node --check connectionDb.js
                  grep -q "get('/health'" routes.js

            - name: Validate Docker Compose
              run: docker compose config --quiet

    gitops:
        name: Deploy
        needs: [build, test]
        if: needs.build.outputs.should_push == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Kustomize
              uses: imranismail/setup-kustomize@v2

            - name: Update GAR overlay image tags
              working-directory: k8s/overlays/gar
              run: |
                  TAG="sha-${{ needs.build.outputs.sha }}"
                  kustomize edit set image \
                    desafio-devops-app=${{ env.IMAGE_PREFIX }}/desafio-devops-app:${TAG} \
                    desafio-devops-nginx=${{ env.IMAGE_PREFIX }}/desafio-devops-nginx:${TAG} \
                    desafio-devops-db=${{ env.IMAGE_PREFIX }}/desafio-devops-db:${TAG}
                  echo "Rendered overlay:"
                  kustomize build .

            - name: Commit overlay tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add k8s/overlays/gar/kustomization.yaml
                  if git diff --staged --quiet; then
                    echo "Tag already up to date, skipping commit."
                  else
                    git commit -m "ci: update images to sha-${{ needs.build.outputs.sha }}"
                    git push
                  fi

            - name: Manual deploy instructions
              run: |
                  TAG="sha-${{ needs.build.outputs.sha }}"
