name: Build and Deploy

on:
    push:
        branches:
            - main
        paths-ignore:
            - k8s/overlays/gar/kustomization.yaml
    pull_request:
        branches:
            - main
    workflow_dispatch:

env:
    REGISTRY_HOST: ${{ secrets.GAR_LOCATION }}-docker.pkg.dev
    IMAGE_PREFIX: ${{ secrets.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}

jobs:
    build:
        name: Build and Push Images
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            sha: ${{ steps.vars.outputs.sha }}
            should_push: ${{ steps.gate.outputs.should_push }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Calculate short SHA
              id: vars
              run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

            - name: Define if should push to registry
              id: gate
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
                     ( [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.ref }}" == "refs/heads/main" ]] ); then
                      echo "should_push=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "should_push=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Login to Artifact Registry
              if: steps.gate.outputs.should_push == 'true'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY_HOST }}
                  username: _json_key
                  password: ${{ secrets.GCP_SA_KEY }}

            - name: Build & push - app (node)
              uses: docker/build-push-action@v5
              with:
                  context: ./node
                  push: ${{ steps.gate.outputs.should_push == 'true' }}
                  tags: |
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-app:latest
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-app:sha-${{ steps.vars.outputs.sha }}
                  cache-from: type=gha,scope=app
                  cache-to: type=gha,scope=app,mode=max

            - name: Build & push - nginx
              uses: docker/build-push-action@v5
              with:
                  context: ./nginx
                  push: ${{ steps.gate.outputs.should_push == 'true' }}
                  tags: |
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-nginx:latest
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-nginx:sha-${{ steps.vars.outputs.sha }}
                  cache-from: type=gha,scope=nginx
                  cache-to: type=gha,scope=nginx,mode=max

            - name: Build & push - db (mysql)
              uses: docker/build-push-action@v5
              with:
                  context: ./mysql
                  push: ${{ steps.gate.outputs.should_push == 'true' }}
                  tags: |
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-db:latest
                      ${{ env.IMAGE_PREFIX }}/desafio-devops-db:sha-${{ steps.vars.outputs.sha }}
                  cache-from: type=gha,scope=db
                  cache-to: type=gha,scope=db,mode=max

            - name: Published images summary
              if: steps.gate.outputs.should_push == 'true'
              run: |
                  echo "### Published images" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "- \`${{ env.IMAGE_PREFIX }}/desafio-devops-app:sha-${{ steps.vars.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- \`${{ env.IMAGE_PREFIX }}/desafio-devops-nginx:sha-${{ steps.vars.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- \`${{ env.IMAGE_PREFIX }}/desafio-devops-db:sha-${{ steps.vars.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

    deploy:
        name: Deploy to Kubernetes
        needs: build
        if: needs.build.outputs.should_push == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Configure kubeconfig
              run: |
                  mkdir -p "$HOME/.kube"
                  echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
                  chmod 600 "$HOME/.kube/config"
                  kubectl cluster-info
                  kubectl get nodes

            - name: Update GAR overlay image tags
              working-directory: k8s/overlays/gar
              run: |
                  TAG="sha-${{ needs.build.outputs.sha }}"
                  kustomize edit set image \
                    desafio-devops-app=${{ env.IMAGE_PREFIX }}/desafio-devops-app:${TAG} \
                    desafio-devops-nginx=${{ env.IMAGE_PREFIX }}/desafio-devops-nginx:${TAG} \
                    desafio-devops-db=${{ env.IMAGE_PREFIX }}/desafio-devops-db:${TAG}
                  echo "Rendered overlay:"
                  kubectl kustomize .

            - name: Commit overlay tag (GitOps)
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add k8s/overlays/gar/kustomization.yaml
                  if git diff --staged --quiet; then
                    echo "Tag already up to date, skipping commit."
                  else
                    git commit -m "deploy: update images to sha-${{ needs.build.outputs.sha }}"
                    git push
                  fi

            - name: Create registry pull secret
              env:
                  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
              run: |
                  kubectl create namespace desafio-devops --dry-run=client -o yaml | kubectl apply -f -
                  kubectl delete secret gar-registry -n desafio-devops --ignore-not-found
                  kubectl create secret docker-registry gar-registry \
                    --docker-server=${{ env.REGISTRY_HOST }} \
                    --docker-username=_json_key \
                    --docker-password="$GCP_SA_KEY" \
                    --namespace=desafio-devops

            - name: Apply GAR overlay
              run: kubectl apply -k k8s/overlays/gar

            - name: Wait for rollout
              run: |
                  kubectl -n desafio-devops rollout status deployment/app --timeout=180s
                  kubectl -n desafio-devops rollout status deployment/nginx --timeout=120s
                  kubectl -n desafio-devops rollout status statefulset/mysql --timeout=300s

            - name: Deploy summary
              run: |
                  echo "### Deploy completed" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "Tag: \`sha-${{ needs.build.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  kubectl -n desafio-devops get pods >> "$GITHUB_STEP_SUMMARY"
